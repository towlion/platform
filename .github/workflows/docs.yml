name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev libcairo2-dev

      - run: pip install mkdocs-material mkdocs-with-pdf weasyprint

      - run: mkdocs gh-deploy --force
