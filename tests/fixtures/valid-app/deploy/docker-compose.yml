services:
  app:
    build:
      context: ..
      dockerfile: app/Dockerfile
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - towlion

networks:
  towlion:
    external: true
