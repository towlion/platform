services:
  app:
    build:
      context: ..
      dockerfile: app/Dockerfile
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp
      - /app/__pycache__
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - towlion

networks:
  towlion:
    external: true
